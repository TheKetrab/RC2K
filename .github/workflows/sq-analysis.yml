name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main # Triggers only on PRs targeting main

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones disabled for better relevancy of analysis

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        shell: powershell
        run: |
          dotnet tool install --global dotnet-coverage

          # 1. Define the report path clearly so both tools agree on it
          $coveragePath = "${{ runner.temp }}\coverage\coverage.opencover.xml"

          # 2. Build the arguments array (much safer than a single string)
          $sonarArgs = @(
            "begin",
            "/k:`"TheKetrab_RC2K`"",
            "/o:`"theketrab`"",
            "/d:sonar.token=`"$env:SONAR_TOKEN`"",
            "/d:sonar.exclusions=`"**/Migrations/*.cs`"",
            "/d:sonar.cs.opencover.reportsPaths=`"$coveragePath`""
          )

          # 3. Dynamically add PR arguments if applicable
          if ($env:GITHUB_EVENT_NAME -eq "pull_request") {
              $sonarArgs += "/d:sonar.pullrequest.key=`"$env:PR_NUMBER`""
              $sonarArgs += "/d:sonar.pullrequest.branch=`"$env:HEAD_REF`""
              $sonarArgs += "/d:sonar.pullrequest.base=`"$env:BASE_REF`""
          }

          # 4. Run Sonar Scanner Begin
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" $sonarArgs

          # 5. Build the solution
          dotnet build "src/RC2K.sln"
        
          # 6. Collect code coverage (matching the exact path and OpenCover format)
          dotnet-coverage collect "dotnet test src/RC2K.sln" -f opencover -o $coveragePath
        
          # 7. End Sonar analysis
          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" end /d:sonar.token="$env:SONAR_TOKEN"